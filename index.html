<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>組合單生成器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f0f0;padding-bottom:40px}
#ui{max-width:640px;margin:0 auto;padding:16px}
.t{font-size:17px;font-weight:700;margin-bottom:12px}
.g{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
@media(max-width:480px){.g{grid-template-columns:1fr}}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;font-weight:700;color:#555}
.f input,.f select{padding:9px 11px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;outline:none;-webkit-appearance:none}
.f input:focus,.f select:focus{border-color:#0071e3}
.f input[readonly]{background:#f5f5f5;color:#888}
.btn-gen{width:100%;margin-top:14px;padding:13px;border:none;border-radius:10px;background:#0071e3;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-gen:active{background:#005bb5}
.btn-pdf{width:100%;margin-top:10px;padding:13px;border:none;border-radius:10px;background:#28a745;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:none}
.btn-pdf:active{background:#1e7e34}
.btn-pdf:disabled{background:#8ecf9e;cursor:not-allowed}
#msg{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:600;display:none;text-align:center}
.ok{background:#d4edda;color:#155724}.err{background:#f8d7da;color:#721c24}.ing{background:#cce5ff;color:#004085}
hr{border:none;border-top:1px solid #ddd;margin:14px 0}
.hint{font-size:12px;color:#888;text-align:center}

/* ── 列印 CSS：Safari 分享→列印 存PDF用 ── */
@media print{
  /* 移除頁首頁尾（網址、時間、頁碼）*/
  @page{
    size:A4 portrait;
    margin:8mm 8mm 8mm 8mm;
  }
  html{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{margin:0;padding:0;background:#fff}
  /* 隱藏輸入介面和按鈕 */
  #ui,#btnPDF,.btn-gen,.btn-pdf{display:none!important}
  /* 顯示組合單，強制填滿A4 */
  #sheet{
    display:block!important;
    position:fixed;
    top:0;left:0;
    width:100vw!important;
    min-width:0!important;
    max-width:none!important;
    margin:0!important;
    padding:0!important;
    background:#fff!important;
  }
  table.form{
    width:100%!important;
    height:calc(100vh - 0px)!important;
    font-size:8.5pt;
    table-layout:fixed;
    page-break-inside:avoid;
  }
  table.form td{padding:1px 3px}
  .sz24{font-size:14pt!important}
  .sz14{font-size:10pt!important}
  .h44{height:34pt!important}
  .h33{height:24pt!important}
  .h22{height:17pt!important}
  .h20{height:16.5pt!important}
  .h18{height:12.5pt!important}
  .yel{background:#ffff00!important;-webkit-print-color-adjust:exact!important}
  .gray{background:#d9d9d9!important;-webkit-print-color-adjust:exact!important}
}

/* 組合單樣式 */
#sheet{display:none;max-width:794px;width:100%;margin:16px auto;background:#fff;padding:0}
#sheet.show{display:block}
table.form{width:794px;border-collapse:collapse;font-family:"新細明體","PMingLiU","Microsoft JhengHei",serif;font-size:11pt;table-layout:fixed}
table.form td{padding:2px 5px;vertical-align:middle;word-break:break-all}
.yel{background:#ffff00}
.gray{background:#d9d9d9}
.bt{border-top:1px solid #000}.btm{border-top:2.5px solid #000}
.bb{border-bottom:1px solid #000}.bbm{border-bottom:2.5px solid #000}
.bl{border-left:1px solid #000}.blm{border-left:2.5px solid #000}
.br{border-right:1px solid #000}
.bold{font-weight:bold}
.c{text-align:center}.l{text-align:left}
.h44{height:44px}.h33{height:33px}.h22{height:22px}.h20{height:20px}.h18{height:18px}
.sz24{font-size:18pt}.sz14{font-size:13pt}
</style>
</head>

<button class="btn-gen" id="btnGen">⚡ 生成組合單</button>

document.getElementById('btnPDF').addEventListener('click',async function(){

  if(typeof domtoimage==='undefined'){

    return;

  const btn=this;

    const sheet=document.getElementById('sheet');

    showMsg('步驟3：產生PDF…','ing');
    const img=new Image();
    img.src=dataUrl;

    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const margin=8,imgW=194;
    const imgH=img.naturalHeight*(imgW/img.naturalWidth);
    pdf.addImage(dataUrl,'JPEG',margin,margin,imgW,Math.min(imgH,281));
    pdf.save(pdfFilename);
    showMsg('✅ 完成：'+pdfFilename,'ok');
  }catch(e){
    document.getElementById('sheet').style.cssText='display:block;max-width:794px;width:100%;margin:16px auto;background:#fff;padding:0';
    showMsg('❌ 錯誤：'+e.message,'err');
    console.error(e);
  }finally{
    btn.disabled=false;btn.textContent='⬇ 下載 PDF';
  }
