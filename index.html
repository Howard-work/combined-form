<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>組合單生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* 1. 介面樣式 */
        #ui-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-family: sans-serif;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        #btn-generate { background: #007bff; color: white; }
        #btn-save-pdf { background: #28a745; color: white; display: none; }

        /* 2. PDF 表格區域 (A4 比例固定) */
        #print-area {
            display: none; /* 平時隱藏，只在生成 PDF 時讀取 */
            width: 794px;  /* A4 96dpi 標準寬度 */
            padding: 40px;
            background: white;
            margin: 0 auto;
        }
        #print-area.active { display: block; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-family: "MSung", "新細明體", serif;
        }
        td {
            border: 1px solid black;
            padding: 5px;
            height: 25px;
        }
    </style>
</head>
<body>

<div id="ui-container">
    <h3>組合單生成器</h3>
    <label>機型：</label>
    <select id="model-select">
        <option value="6330">6330</option>
        <option value="6530">6530</option>
    </select>
    <button id="btn-generate" class="btn">生成預覽</button>
    <button id="btn-save-pdf" class="btn">下載 A4 單頁 PDF</button>
</div>

<div id="print-area">
    <table id="target-table">
        <tr>
            <td colspan="4" style="text-align:center; font-size:20pt; font-weight:bold;">組合單</td>
        </tr>
        </table>
</div>

<script>
    // 這裡放入你原本的資料 (MM, INV 等)
    const MM = { /* ... */ };
    const INV = { /* ... */ };

    const btnGen = document.getElementById('btn-generate');
    const btnSave = document.getElementById('btn-save-pdf');
    const printArea = document.getElementById('print-area');

    btnGen.onclick = () => {
        // 執行你原本的填表邏輯...
        printArea.classList.add('active');
        btnSave.style.display = 'block';
    };

    // 核心修正：強制輸出成 A4 檔案
    btnSave.onclick = async function() {
        const { jsPDF } = window.jspdf;
        
        // 1. 將 HTML 轉為 Canvas 圖片
        const canvas = await html2canvas(printArea, {
            scale: 2, // 提升清晰度
            useCORS: true,
            logging: false
        });

        const imgData = canvas.toDataURL('image/jpeg', 1.0);
        
        // 2. 建立 A4 尺寸 PDF (210mm x 297mm)
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        // 3. 將圖片強制縮放放入 A4 頁面，不留邊距或根據需求微調
        pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight);
        
        // 4. 手機端會觸發檔案下載
        const fileName = `組合單_${document.getElementById('model-select').value}.pdf`;
        pdf.save(fileName);
    };
</script>

</body>
</html>
